name: Build and Push Image (reusable)

on:
  workflow_call:
    inputs:
      image_name:
        description: Name of the image on the registry (e.g. userland-debian)
        required: true
        type: string
      upstream_image:
        description: Upstream base image to track for change detection (e.g. debian:latest)
        required: true
        type: string
      dockerfile:
        description: Dockerfile to build from (e.g. Dockerfile.debian)
        required: true
        type: string
      platforms:
        description: Comma-separated buildx platform list
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  # -----------------------------------------------------------------------
  # On scheduled runs, skip the build if the upstream base image digest
  # hasn't changed since we last pushed.  All other triggers always build.
  # -----------------------------------------------------------------------
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      upstream_digest: ${{ steps.check.outputs.upstream_digest }}
    steps:
      - name: Compare upstream digest with last-built label
        id: check
        env:
          OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ inputs.image_name }}
          UPSTREAM_IMAGE: ${{ inputs.upstream_image }}
        run: |
          UPSTREAM=$(docker manifest inspect "$UPSTREAM_IMAGE" 2>/dev/null \
            | sha256sum | cut -d' ' -f1)
          echo "upstream_digest=$UPSTREAM" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GHCR_IMAGE="ghcr.io/$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')/${IMAGE_NAME}:latest"
          LAST=$(docker manifest inspect "$GHCR_IMAGE" 2>/dev/null \
            | jq -r '.config.Labels["userland.upstream-digest"] // ""' \
            || echo "")

          if [ "$UPSTREAM" != "$LAST" ]; then
            echo "Upstream changed ($LAST -> $UPSTREAM); will rebuild."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream unchanged ($UPSTREAM); skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check DockerHub credentials
        id: dh
        env:
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          [ -n "$DH_TOKEN" ] && echo "available=true" >> "$GITHUB_OUTPUT" \
                             || echo "available=false" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        if: steps.dh.outputs.available == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute date tag
        id: date
        run: echo "value=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: ${{ inputs.image_name }}
          DATE: ${{ steps.date.outputs.value }}
          OWNER: ${{ github.repository_owner }}
        run: |
          GHCR="ghcr.io/$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')/${IMAGE_NAME}"
          {
            echo "${GHCR}:latest"
            echo "${GHCR}:${DATE}"
            if [ -n "$DH_USER" ]; then
              echo "${DH_USER}/${IMAGE_NAME}:latest"
              echo "${DH_USER}/${IMAGE_NAME}:${DATE}"
            fi
          } > /tmp/tags.txt
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/tags.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          labels: |
            userland.upstream-digest=${{ needs.check-upstream.outputs.upstream_digest }}
            org.opencontainers.image.created=${{ steps.date.outputs.value }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha,scope=${{ inputs.image_name }}
          cache-to: type=gha,scope=${{ inputs.image_name }},mode=max
