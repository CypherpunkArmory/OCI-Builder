name: Build and Push

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - 'input/**'
      - 'assets/**'

jobs:
  # -----------------------------------------------------------------------
  # On scheduled runs, skip the build if upstream debian:latest hasn't
  # changed since we last pushed.  All other triggers always build.
  # -----------------------------------------------------------------------
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      upstream_digest: ${{ steps.check.outputs.upstream_digest }}
    steps:
      - name: Compare upstream digest with last-built label
        id: check
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/userland-debian
        run: |
          UPSTREAM=$(docker manifest inspect debian:latest 2>/dev/null \
            | sha256sum | cut -d' ' -f1)
          echo "upstream_digest=$UPSTREAM" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST=$(docker manifest inspect "${GHCR_IMAGE}:latest" 2>/dev/null \
            | jq -r '.config.Labels["userland.upstream-digest"] // ""' \
            || echo "")

          if [ "$UPSTREAM" != "$LAST" ]; then
            echo "Upstream changed ($LAST -> $UPSTREAM); will rebuild."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream unchanged ($UPSTREAM); skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm,arm64,386

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute date tag
        id: date
        run: echo "value=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DATE: ${{ steps.date.outputs.value }}
          OWNER: ${{ github.repository_owner }}
        run: |
          GHCR="ghcr.io/${OWNER}/userland-debian"
          {
            echo "${GHCR}:latest"
            echo "${GHCR}:${DATE}"
            if [ -n "$DH_USER" ]; then
              echo "${DH_USER}/userland-debian:latest"
              echo "${DH_USER}/userland-debian:${DATE}"
            fi
          } > /tmp/tags.txt
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/tags.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/386
          push: true
          labels: |
            userland.upstream-digest=${{ needs.check-upstream.outputs.upstream_digest }}
            org.opencontainers.image.created=${{ steps.date.outputs.value }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
